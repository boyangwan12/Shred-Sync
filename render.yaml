services:
  - type: web
    name: shred-sync
    runtime: node
    rootDir: shredding-dashboard
    # --include=dev forces devDependencies install even with NODE_ENV=production
    # (Next.js build needs tailwind, typescript, postcss plugins at build time)
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: npm start
    plan: free
    envVars:
      # Don't set NODE_ENV here — Render sets it to "production" at runtime
      # automatically. Setting it explicitly also applies during build, which
      # makes npm ci skip devDependencies that Next.js needs to build.
      - key: TURSO_DATABASE_URL
        sync: false # set via Render dashboard
      - key: TURSO_AUTH_TOKEN
        sync: false # set via Render dashboard
      - key: APP_PASSWORD
        sync: false # set via Render dashboard
      - key: APP_USER
        value: me
